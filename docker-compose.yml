services:
  postgres:
    image: postgres:15-alpine
    container_name: xmpp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - xmpp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ejabberd:
    image: ejabberd/ecs:latest
    container_name: xmpp_ejabberd
    restart: unless-stopped
    environment:
      # Основные переменные - они переопределят значения в YAML
      EJABBERD_DOMAIN: ${DOMAIN}
      EJABBERD_ADMIN: ${EJABBERD_ADMIN}
      EJABBERD_ADMIN_PASSWORD: ${EJABBERD_ADMIN_PASSWORD}
      EJABBERD_LANG: ${EJABBERD_LANG}
      EJABBERD_DB_TYPE: pgsql
      EJABBERD_DB_HOST: postgres
      EJABBERD_DB_PORT: 5432
      EJABBERD_DB_NAME: ${POSTGRES_DB}
      EJABBERD_DB_USER: ${POSTGRES_USER}
      EJABBERD_DB_PASS: ${POSTGRES_PASSWORD}
    volumes:
      - ./ejabberd/ejabberd.yml:/home/ejabberd/conf/ejabberd.yml:ro
      - ./data/ejabberd/ssl:${EJABBERD_SSL_DIR}:ro
      - ./data/ejabberd/backup:/home/ejabberd/backup
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - xmpp_network

  php:
    image: php:8.4-fpm-alpine
    container_name: xmpp_php
    restart: unless-stopped
    volumes:
      - ./php:/var/www/html
    networks:
      - xmpp_network

  caddy:
    build: ./caddy
    container_name: xmpp_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}   # передаём домен в Caddy для использования в Caddyfile
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
      - ./php:/var/www/html
    networks:
      - xmpp_network
    depends_on:
      - ejabberd
      - php

  # Опционально: adminer для управления БД (доступ через Caddy, если добавить маршрут)
  adminer:
    image: adminer:latest
    container_name: xmpp_adminer
    restart: unless-stopped
    networks:
      - xmpp_network
    depends_on:
      - postgres
    # Публиковать порты не нужно — доступ через прокси (если настроить)

networks:
  xmpp_network:
    driver: bridge