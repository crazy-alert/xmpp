services:
  postgres:
    image: postgres:15-alpine
    container_name: xmpp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - xmpp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ejabberd:
    image: ejabberd/ecs:latest
    container_name: xmpp_ejabberd
    restart: unless-stopped
    environment:
      # Основные переменные - они переопределят значения в YAML
       EJABBERD_MACRO_HOST: ${DOMAIN}
       EJABBERD_MACRO_ADMIN_JID: ${EJABBERD_ADMIN_JID}
       EJABBERD_MACRO_DB_NAME: ${POSTGRES_DB}
       EJABBERD_MACRO_DB_USER: ${POSTGRES_USER}
       EJABBERD_MACRO_DB_PASS: ${POSTGRES_PASSWORD}
       EJABBERD_MACRO_TURN_SECRET: ${TURN_SECRET}
       EJABBERD_MACRO_STUN_PORT: ${STUN_PORT}
       EJABBERD_MACRO_TURN_PORT: ${TURN_PORT}
       EJABBERD_MACRO_TURN_TLS_PORT: ${TURN_TLS_PORT}
    volumes:
      - ./data/caddy/data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}:/certs:ro
      - ./ejabberd/ejabberd.yml:/home/ejabberd/conf/ejabberd.yml:ro
      - ./data/ejabberd/backup:/home/ejabberd/backup
    depends_on:
      caddy:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - xmpp_network

  php:
    image: php:8.4-fpm-alpine
    container_name: xmpp_php
    restart: unless-stopped
    volumes:
      - ./php:/var/www/html
    networks:
      - xmpp_network

  ccaddy:
    image: caddy:latest
    container_name: xmpp_caddy
    restart: unless-stopped
    user: "1000:1000"  # или любой другой UID
    cap_add:
      - NET_BIND_SERVICE  # позволяет открывать порты <1024 не-root пользователем
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_data/config:/config
      - ./php:/var/www/html
    networks:
      - xmpp_network

  coturn:
    image: coturn/coturn:latest
    container_name: xmpp_coturn
    restart: unless-stopped
    network_mode: host
    environment:
      - TURN_USER=${TURN_USER}
      - TURN_PASSWORD=${TURN_PASSWORD}
      - TURN_REALM=${DOMAIN}
      - TURN_SECRET=${TURN_SECRET}
      - TURN_PORT=${TURN_PORT}
      - TURN_TLS_PORT=${TURN_TLS_PORT}
      - TURN_MIN_PORT=${TURN_MIN_PORT}
      - TURN_MAX_PORT=${TURN_MAX_PORT}
      - TURN_VERBOSE=1
    command:
      - -n
      - --user=${TURN_USER}:${TURN_PASSWORD}
      - --realm=${DOMAIN}
      - --static-auth-secret=${TURN_SECRET}
      - --listening-port=${TURN_PORT}
      - --tls-listening-port=${TURN_TLS_PORT}
      - --min-port=${TURN_MIN_PORT}
      - --max-port=${TURN_MAX_PORT}
      - --fingerprint
      - --lt-cred-mech
      - --use-auth-secret
      - --no-tcp-relay
      - --no-tlsv1
      - --no-tlsv1_1
      - --no-sslv3
      - --log-file=stdout

  # Опционально: adminer для управления БД (доступ через Caddy, если добавить маршрут)
  adminer:
    image: adminer:latest
    container_name: xmpp_adminer
    restart: unless-stopped
    networks:
      - xmpp_network
    depends_on:
      - postgres
    # Публиковать порты не нужно — доступ через прокси (если настроить)

networks:
  xmpp_network:
    driver: bridge